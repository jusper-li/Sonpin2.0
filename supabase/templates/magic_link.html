<html>
  <body style="margin:0; padding:0; background:#fbf6ee; font-family:Arial, 'Noto Sans TC', sans-serif; color:#4a372e;">
    <div style="max-width:560px; margin:0 auto; padding:40px 24px;">
      <div style="background:#fffaf1; border:1px solid #ead8c7; border-radius:16px; padding:32px 28px;">
        <p style="margin:0 0 12px; font-size:14px; letter-spacing:0.08em; color:#a88267;">Sonpin</p>
        <h1 style="margin:0 0 16px; font-size:24px; line-height:1.4;">你的登入連結</h1>
        <p style="margin:0 0 24px; font-size:16px; line-height:1.8;">
          你可以使用下方驗證碼或登入連結完成 Sonpin 登入。
        </p>
        <div style="margin:0 0 24px; padding:18px 20px; border-radius:12px; background:#f4eadf; text-align:center; font-size:32px; letter-spacing:0.3em; font-weight:700;">
          {{ .Token }}
        </div>
        <p style="margin:0; font-size:14px; line-height:1.8; color:#7c665a;">
          如果這不是你的操作，請忽略這封信件。
        </p>
      </div>
    </div>
  </body>
</html>
