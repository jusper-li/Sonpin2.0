[build]
  command = "rm -rf dist node_modules/.vite && npm run build"
  publish = "dist"

[[headers]]
  for = "/product-images/optimized/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/homepage-images/optimized/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
